name: tests

on:
  push:
    branches: [master]
    paths:
      - 'training/**'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [master]
    paths:
      - 'training/**'
      - '.github/workflows/tests.yml'
  workflow_dispatch: {}

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: training

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: training/pyproject.toml

      - name: Install OpenCV runtime libs
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libsm6 libxext6 libxrender1

      - name: Install Python deps (skip bpy + pyrender; tests don't need them)
        # Install the full [dev] set minus the two heavy deps that no test
        # imports. Saves ~700 MB / 5+ min per run. If you ever add tests
        # that exercise the Blender or pyrender renderer, drop the filter.
        run: |
          python -m pip install --upgrade pip
          # Install dev tooling first so the rest of the install can fail
          # fast without pulling fastapi etc. unnecessarily.
          pip install pytest pytest-cov
          # Install everything in pyproject.toml dependencies EXCEPT bpy + pyrender.
          # We install the package itself with --no-deps then add deps explicitly,
          # which lets us cleanly skip specific lines.
          pip install --no-deps -e .
          pip install \
            'torch>=2.2,<3.0' \
            'torchvision>=0.17,<1.0' \
            'timm>=1.0.0' \
            'ultralytics>=8.2.0' \
            'numpy>=1.26' \
            'Pillow>=10.0' \
            'pyyaml>=6.0' \
            'requests>=2.31' \
            'beautifulsoup4>=4.12' \
            'trimesh>=4.0' \
            'scipy>=1.11' \
            'scikit-learn>=1.4' \
            'onnx>=1.16' \
            'onnxruntime>=1.18' \
            'matplotlib>=3.8' \
            'imagehash>=4.3' \
            'jinja2>=3.1' \
            'opencv-python-headless' \
            'fastapi' 'uvicorn[standard]' 'python-multipart' 'httpx' \
            'ddgs' 'icrawler' 'streamlit' 'python-dotenv'

      - name: Run pytest
        id: pytest
        # pipefail is required so the pipe's exit status reflects pytest's
        # exit status, not tee's. Without it, "tee | pipefail" always
        # returns 0 and the workflow falsely reports success.
        shell: bash
        run: |
          set -eo pipefail
          set +e
          pytest tests/ -v --tb=long 2>&1 | tee pytest.log
          EXIT=${PIPESTATUS[0]}
          # Stash output in the GHA step summary (publicly viewable on the run page)
          {
            echo "## pytest output (last 200 lines)"
            echo '```'
            tail -200 pytest.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit $EXIT

      - name: Upload pytest log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log
          path: training/pytest.log
          retention-days: 7
