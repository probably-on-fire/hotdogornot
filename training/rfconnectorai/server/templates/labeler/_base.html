<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}RFCAI Labeler{% endblock %}</title>
  {% block htmx_script %}{% endblock %}
  <style>
    :root {
      --bg: #0f1115;
      --panel: #161a22;
      --panel-2: #1d222c;
      --border: #2a313e;
      --text: #d6dde8;
      --muted: #8a93a3;
      --accent: #4f8cff;
      --green: #4ade80;
      --red: #f87171;
      --orange: #fb923c;
      --violet: #a78bfa;
      --gray: #6b7280;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
    }
    main.centered-page {
      padding: 0;
      min-height: calc(100vh - 45px);
      display: flex; align-items: center; justify-content: center;
    }
    header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px;
    }
    header h1 { font-size: 16px; margin: 0; font-weight: 600; }
    main { padding: 16px 20px; }
    /* Common form / input styles */
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 8px 10px;
      background: var(--panel-2); color: var(--text);
      border: 1px solid var(--border); border-radius: 4px;
      font-size: 14px; margin-bottom: 16px; outline: none;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      border-color: var(--accent);
    }
    input[type="number"] {
      background: var(--panel-2); color: var(--text);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 4px 6px; width: 80px; font-size: 12px;
    }
    select {
      background: var(--panel-2); color: var(--text);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 4px 6px; font-size: 12px;
    }
    button[type="submit"] {
      width: 100%; padding: 10px; background: var(--accent); color: white;
      border: none; border-radius: 4px; font-size: 14px; font-weight: 600;
      cursor: pointer;
    }
    button[type="submit"]:hover { filter: brightness(1.1); }
    .error { color: var(--red); font-size: 12px; margin-bottom: 14px; }
    /* Login / generic card */
    .card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
      padding: 32px 28px; width: 100%; max-width: 340px;
    }
    .card h1 { font-size: 16px; margin: 0 0 24px; font-weight: 600; }
  </style>
  {% block head_extra %}{% endblock %}
</head>
<body>
  <header>
    <h1>{% block page_title %}RFCAI Labeler{% endblock %}</h1>
    {% block header_nav %}{% endblock %}
    {% if request.session.get('user_id') %}
    <div style="margin-left: auto; font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 8px;">
      <span>{{ request.session.get('username', '') }}</span>
      <a href="/rfcai/labeler/admin/users" style="color: var(--accent); text-decoration: none;">Admin</a>
      <form method="post" action="/rfcai/labeler/logout" style="display:inline; margin:0;">
        <button type="submit" style="background:none; border:none; color:var(--muted); font-size:12px; cursor:pointer; padding:0;">Sign out</button>
      </form>
    </div>
    {% endif %}
  </header>
  {% block content %}{% endblock %}
</body>
</html>
