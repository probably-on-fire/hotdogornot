<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RFCAI Labeler — Sign in</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #161a22;
      --panel-2: #1d222c;
      --border: #2a313e;
      --text: #d6dde8;
      --muted: #8a93a3;
      --accent: #4f8cff;
      --red: #f87171;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
      padding: 32px 28px; width: 100%; max-width: 340px;
    }
    h1 { font-size: 16px; margin: 0 0 24px; font-weight: 600; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 8px 10px;
      background: var(--panel-2); color: var(--text);
      border: 1px solid var(--border); border-radius: 4px;
      font-size: 14px; margin-bottom: 16px; outline: none;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      border-color: var(--accent);
    }
    button[type="submit"] {
      width: 100%; padding: 10px; background: var(--accent); color: white;
      border: none; border-radius: 4px; font-size: 14px; font-weight: 600;
      cursor: pointer;
    }
    button[type="submit"]:hover { filter: brightness(1.1); }
    .error { color: var(--red); font-size: 12px; margin-bottom: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>RFCAI Labeler — Sign in</h1>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post" action="/rfcai/labeler/login">
      <input type="hidden" name="next" value="{{ next }}">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autofocus autocomplete="username">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password">
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
